<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Camellia RPG - Fichas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1 class="glitch-text">CAMELLIA RPG</h1>
    <div class="header-actions">
      <input id="search" placeholder="Buscar feiticeiro..." />
      <button id="newBtn">Nova Ficha</button>
      <button id="exportAllBtn">Exportar Todas</button>
      <input type="file" id="importFile" accept=".json" style="display:none" />
      <button id="importBtn">Importar</button>
    </div>
  </header>

  <main>
    <aside class="left-pane">
      <div class="list" id="charList"></div>
    </aside>

    <section class="sheet" id="sheet">
      <div class="info">
        <div class="portrait-container">
          <img id="portraitImg" src="" alt="Portrait" onerror="this.src='https://via.placeholder.com/220x280/111/00ccff?text=Portrait'" />
          <input type="text" id="portraitUrl" placeholder="URL da imagem" />
          <button id="loadPortraitBtn">Carregar Portrait</button>
        </div>

        <input id="name" placeholder="Nome do Feiticeiro" style="font-size: 1.5em; text-align: center;" />

        <div class="meta">
          <input id="age" placeholder="Idade" />
          <input id="species" placeholder="Espécie" />
          <input id="grade" placeholder="Grau" />
        </div>

        <textarea id="bio" placeholder="Conceito / História"></textarea>
      </div>

      <div class="box">
        <h3>Status</h3>
        <div class="bars">
          <label>PV <span id="pvVal"></span></label>
          <input id="pvMax" type="number" /> <input id="pvNow" type="number" />

          <label>PEA <span id="peaVal"></span></label>
          <input id="peaMax" type="number" /> <input id="peaNow" type="number" />

          <label>PE <span id="peVal"></span></label>
          <input id="peMax" type="number" /> <input id="peNow" type="number" />
        </div>
      </div>
      <!-- Atributos -->
      <div class="box attributes">
        <h3>Atributos</h3>
  <div class="attrs" id="attributes"></div>
</div>

      <div class="box dice-roller">
        <h3>Rolagem Rápida (2d10)</h3>
        <div class="roll-area">
          <input id="rollMod" type="number" value="0" placeholder="Modificador" />
          <button id="rollBtn">Rolar 2d10 + Mod</button>
        </div>
        <div id="rollResult" class="roll-result"></div>
        <small id="rollDetail"></small>
      </div>

      <div class="box">
        <h3>Histórico de Rolagens</h3>
        <div id="rollHistory" class="history"></div>
      </div>

      <div class="box">
        <h3>Técnica Inata</h3>
        <textarea id="innateTech" placeholder="Descreva sua técnica..."></textarea>
      </div>

      <div class="sheet-actions">
        <button id="saveBtn">Salvar Ficha</button>
        <button id="duplicateBtn">Duplicar</button>
        <button id="deleteBtn">Excluir</button>
        <button id="exportBtn">Exportar JSON</button>
      </div>
    </section>
  </main>

  <footer>
    <small>Camellia RPG 2ª Edição • Fichas Digitais</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
