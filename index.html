<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Camellia RPG - Fichas</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .glitch-text { font-family: 'Creepster', system-ui; color: #00ccff; text-shadow: 0 0 10px #00ccff; }
  </style>
</head>
<body>
  <header>
    <h1 class="glitch-text">CAMELLIA RPG</h1>
    <div class="header-actions">
      <input id="search" placeholder="Buscar feiticeiro..." />
      <button id="newBtn">Nova Ficha</button>
      <button id="exportAllBtn">Exportar Todas</button>
      <input type="file" id="importFile" accept=".json" style="display:none" />
      <button id="importBtn">Importar</button>
    </div>
  </header>

  <main>
    <aside class="left-pane">
      <div class="list" id="charList"></div>
    </aside>

    <section class="sheet" id="sheet">
      <!-- Topo -->
      <div class="top-row">
        <div class="info">
	<div class="portrait-container">
  	  <img id="portraitImg" src="" alt="Portrait do Personagem" 
         onerror="this.src='https://via.placeholder.com/220x280/111/00ccff?text=Sem+Portrait'" />
    <input type="text" id="portraitUrl" placeholder="Cole a URL da imagem aqui" />
    <button id="loadPortraitBtn">Carregar Portrait</button>
  </div>
          <input id="name" placeholder="Nome do Feiticeiro" />
          <div class="meta">
            <input id="age" placeholder="Idade" />
            <input id="species" placeholder="Espécie (Humano/Mestiço...)" />
            <input id="grade" placeholder="Grau (4 a Especial)" />
          </div>
          <textarea id="bio" placeholder="Conceito / História"></textarea>
        </div>

        <div class="bars">
          <label>PV <span id="pvVal"></span></label>
          <input id="pvMax" type="number" /> <input id="pvNow" type="number" />

          <label>PEA <span id="peaVal"></span></label>
          <input id="peaMax" type="number" /> <input id="peaNow" type="number" />

          <label>PE <span id="peVal"></span></label>
          <input id="peMax" type="number" /> <input id="peNow" type="number" />
        </div>
      </div>

      <!-- Atributos -->
      <div class="box attributes">
        <h3>Atributos</h3>
        <div class="attrs" id="attributes"></div>
      </div>
	<div class="box dice-roller">
  <h3>Rolagem Rápida (2d10)</h3>
  <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
    <input id="rollMod" type="number" value="0" style="width: 80px;" placeholder="Mod" />
    <button id="rollBtn">Rolar 2d10 + Mod</button>
    <div id="rollResult" style="font-size: 1.4em; font-weight: bold; min-width: 120px;"></div>
  </div>
  <small id="rollDetail"></small>
</div>
      <!-- Maestria -->
      <div class="box">
        <h3>Maestria (PMs)</h3>
        <div id="mastery"></div>
      </div>

      <!-- Técnica Inata -->
      <div class="box">
        <h3>Técnica Inata</h3>
        <textarea id="innateTech" placeholder="Conceito base + extensões..."></textarea>
      </div>

      <!-- Outros campos -->
      <div class="bottom-row">
        <div class="box">
          <h3>Repertório</h3>
          <textarea id="repertoire" placeholder="Frases do repertório..."></textarea>
        </div>
        <div class="box">
          <h3>Equipamentos / Ferramentas</h3>
          <textarea id="equipment" placeholder="Armas, objetos amaldiçoados..."></textarea>
        </div>
      </div>

      <div class="sheet-actions">
        <button id="saveBtn">Salvar</button>
        <button id="duplicateBtn">Duplicar</button>
        <button id="deleteBtn">Excluir</button>
        <button id="exportBtn">Exportar JSON</button>
      </div>
    </section>
  </main>

  <footer>
    <small>Camellia RPG 2ª Edição • Fichas Digitais (localStorage + JSON)</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
